# GitHub Pages deploy for the static Vite build.
#
# PREPARED BUT NOT ACTIVATED. Runs only on manual dispatch; the push
# trigger below stays commented out until the repo owner enables Pages
# (Settings -> Pages -> Source: GitHub Actions) and approves the first
# public deploy.

name: deploy-pages

on:
  workflow_dispatch: {}
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
